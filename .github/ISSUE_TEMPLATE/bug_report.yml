name: Bug Report
description: Report a problem with windows-service-monitor
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: Module Version
      description: Value of `ModuleVersion` in `WindowsServiceMonitor.psd1`
      placeholder: "e.g. 1.1.2"
    validations:
      required: true

  - type: input
    id: ps-version
    attributes:
      label: PowerShell Version
      description: Output of `$PSVersionTable.PSVersion`
      placeholder: "e.g. 5.1.19041.4648"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: Windows version (output of `[System.Environment]::OSVersion`)
      placeholder: "e.g. Windows Server 2022 21H2"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps that trigger the bug
      placeholder: |
        1. Set `$SMTPServer = ...`
        2. Run `.\Check-Services.ps1`
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happens?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log Output / Error Messages
      description: Paste any error output here
      render: text
