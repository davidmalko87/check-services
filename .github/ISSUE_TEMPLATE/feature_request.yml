name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide as much context as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem it Solves
      description: What limitation or pain point does this feature address?
      placeholder: "e.g. There is no way to exclude certain services from alerting..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you'd like to see
      placeholder: "e.g. Add an `-ExcludeService` parameter that accepts a list of service names..."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area Affected
      description: Which part of the project does this touch?
      options:
        - Core logic (Check-Services.ps1)
        - Email / alerting
        - Configuration
        - Documentation
        - CI / tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you have thought of
