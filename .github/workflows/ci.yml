name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test — ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            shell: powershell
            label: Windows PowerShell 5.1
          - os: windows-latest
            shell: pwsh
            label: Windows PowerShell 7
          - os: ubuntu-latest
            shell: pwsh
            label: Ubuntu PowerShell 7

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        shell: ${{ matrix.shell }}
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          Install-Module -Name Pester -Force -Scope CurrentUser -MinimumVersion 5.0 -SkipPublisherCheck

      - name: Run PSScriptAnalyzer
        shell: ${{ matrix.shell }}
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error,Warning
          if ($results) {
            $results | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($results.Count) issue(s)."
            exit 1
          }
          Write-Host "PSScriptAnalyzer: no issues found."

      - name: Verify script syntax
        shell: ${{ matrix.shell }}
        run: |
          $errors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            (Join-Path $env:GITHUB_WORKSPACE 'WindowsServiceMonitor.psm1'),
            [ref]$null,
            [ref]$errors
          )
          if ($errors) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
          Write-Host "Syntax check passed."

      - name: Run Pester tests
        shell: ${{ matrix.shell }}
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.Path = @('./WindowsServiceMonitor.psm1')
          $config.CodeCoverage.OutputFormat = 'JaCoCo'
          $config.CodeCoverage.OutputPath = './coverage.xml'
          Invoke-Pester -Configuration $config
