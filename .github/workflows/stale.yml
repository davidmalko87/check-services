name: Mark stale issues and PRs

on:
  schedule:
    - cron: '0 0 * * 1'   # every Monday at midnight UTC

jobs:
  stale:
    name: Stale sweep
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been inactive for 60 days and will be closed in 14 days
            unless there is new activity. If this is still relevant, please leave a
            comment or remove the `stale` label.
          stale-pr-message: >
            This pull request has been inactive for 60 days and will be closed in
            14 days unless updated. Please rebase, address any review comments, or
            leave a note if you still plan to finish it.
          close-issue-message: Closed due to inactivity. Please reopen if still relevant.
          close-pr-message: Closed due to inactivity. Please reopen if still relevant.
          exempt-issue-labels: pinned,security
          exempt-pr-labels: pinned,security
